name: Release (All Platforms)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
            args: ""
            rust_targets: ""
          - platform: macos-latest
            target: universal-apple-darwin
            label: macos
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux
            args: ""
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MD Reader ${{ github.ref_name }}"
          releaseBody: |
            ## 修复

            - 修复 Mermaid 流程图在 Windows 中 `<br/>` 标签导致 libxml2 解析报错的问题
            - 全平台自动构建：Windows (.msi + .exe) / macOS (.dmg) / Linux (.AppImage + .deb + .rpm)

            ## 下载说明

            - **Windows**: 下载 .msi 安装版或 portable .exe 绿色版
            - **macOS / Linux**: 实验版，未签名；macOS 首次打开右键 → 打开，Linux AppImage 需先 `chmod +x`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
